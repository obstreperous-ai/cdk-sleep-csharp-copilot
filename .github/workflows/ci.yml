name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test-synth-diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore
        run: dotnet restore src/CdkBase.sln

      - name: Test
        run: dotnet test src/CdkBase.sln --no-restore

      - name: CDK Synth
        run: npx -y aws-cdk synth

      - name: CDK Diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD^)"
          fi

          git worktree add /tmp/cdk-base "$BASE_SHA"
          (
            cd /tmp/cdk-base
            npx -y aws-cdk synth > /dev/null
          )

          npx -y aws-cdk diff --template /tmp/cdk-base/cdk.out/CdkBaseStack.template.json --fail
