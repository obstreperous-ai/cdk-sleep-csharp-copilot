name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test-synth:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore
        run: dotnet restore src/CdkBase.sln

      - name: Publish Lambda
        run: dotnet publish src/SleepAudioProcessor/SleepAudioProcessor.csproj -c Release -r linux-x64 --self-contained false -o /tmp/workspace/obstreperous-ai/cdk-sleep-csharp-copilot/src/SleepAudioProcessor/bin/Release/net8.0/publish

      - name: Test
        run: dotnet test src/CdkBase.sln --no-restore --collect:"XPlat Code Coverage" --logger "console;verbosity=normal"

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: '**/coverage.cobertura.xml'
          fail_ci_if_error: false

      - name: CDK Synth
        run: npx -y aws-cdk synth
